<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satellite - Argus Intelligence</title>
  <link rel="stylesheet" href="../lib/vendor/leaflet.css">
  <link rel="stylesheet" href="../shared/argus-std.css">
  <link rel="stylesheet" href="../shared/ribbon.css">
  <link rel="stylesheet" href="../lib/argus-chat.css">
  <link rel="stylesheet" href="../shared/xmpp-chat.css">
  <link rel="stylesheet" href="intel.css">
</head>
<body>
  <script src="../shared/ribbon.js"></script>

  <header class="intel-page-header">
    <svg class="header-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    <h1 class="header-title">Satellite</h1>
    <span class="header-desc">Earth observation imagery. Pan/zoom the map, pick dates, load Sentinel-2 imagery.</span>
    <span class="header-spacer"></span>
  </header>
  <main class="intel-main">
    <svg class="intel-watermark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>

    <!-- Controls -->
    <section class="intel-section">
      <div class="sat-controls">
        <div class="sat-top-row">
          <div class="sat-search-bar">
            <input type="text" id="satSearchInput" class="comp-search-input" placeholder="Jump to location...">
            <button class="pill-chip" id="satJumpBtn">Go</button>
          </div>
          <label class="pill-toggle sat-dual-toggle" id="satDualToggle" title="Compare two different locations">
            <span class="mode-pill-label">Single</span>
            <input type="checkbox" id="satDualCheck">
            <span class="pill-track" style="--pill-color:var(--accent)"><span class="pill-knob"></span></span>
            <span class="mode-pill-label">Dual</span>
          </label>
          <div class="sat-search-bar sat-search-b disabled" id="satSearchBarB">
            <input type="text" id="satSearchInputB" class="comp-search-input" placeholder="Location B..." disabled>
            <button class="pill-chip" id="satJumpBtnB" disabled>Go</button>
          </div>
          <div class="sat-actions">
            <button class="pill-chip" id="satSaveToKg" disabled>Save to KG</button>
            <button class="pill-chip" id="satCaptureView" disabled>Capture View</button>
            <button class="pill-chip" id="satClearPins">Clear Pins</button>
          </div>
        </div>
        <div class="sat-band-date-bar">
          <span class="sat-enhance-label">A Band:</span>
          <button class="pill-chip sat-layer-btn-a active" data-layer="trueColor">True Color</button>
          <button class="pill-chip sat-layer-btn-a" data-layer="falseColor">False Color</button>
          <button class="pill-chip sat-layer-btn-a" data-layer="ndvi">NDVI</button>
          <button class="pill-chip sat-layer-btn-a" data-layer="moisture">Moisture</button>
          <input type="date" id="satDateA" class="evt-date-input">
          <button class="pill-chip sat-center-btn" id="satLoadImagery">Refresh Imagery</button>
          <input type="date" id="satDateB" class="evt-date-input">
          <button class="pill-chip sat-layer-btn-b active" data-layer="trueColor">True Color</button>
          <button class="pill-chip sat-layer-btn-b" data-layer="falseColor">False Color</button>
          <button class="pill-chip sat-layer-btn-b" data-layer="ndvi">NDVI</button>
          <button class="pill-chip sat-layer-btn-b" data-layer="moisture">Moisture</button>
          <span class="sat-enhance-label">:B Band</span>
        </div>
      </div>
    </section>

    <!-- Overlay controls (above map) -->
    <section class="intel-section" id="satOverlaySection">
      <div class="sat-overlay-controls">
        <div class="sat-overlay-row">
          <span class="sat-overlay-label">A</span>
          <input type="range" id="satOpacitySlider" min="0" max="100" value="0" class="sat-opacity-slider">
          <span class="sat-overlay-label">B</span>
        </div>
        <div class="sat-opacity-value" id="satOpacityValue">Image A (100%)</div>
      </div>
      <div class="sat-enhance-bar">
        <div class="sat-enhance-group">
          <span class="sat-enhance-label">Image A:</span>
          <button class="pill-chip sat-enhance-btn-a active" data-enhance="none">Normal</button>
          <button class="pill-chip sat-enhance-btn-a" data-enhance="invert">Invert</button>
          <button class="pill-chip sat-enhance-btn-a" data-enhance="grayscale">B/W</button>
          <button class="pill-chip sat-enhance-btn-a" data-enhance="contrast">Hi-Contrast</button>
          <button class="pill-chip sat-enhance-btn-a" data-enhance="saturate">Saturate</button>
          <button class="pill-chip sat-enhance-btn-a" data-enhance="edge">Edge</button>
          <button class="pill-chip sat-enhance-btn-a" data-enhance="block">Block</button>
        </div>
        <button class="pill-chip sat-center-btn" id="satSwapBtnEnhance">⇄ Swap A/B</button>
        <div class="sat-enhance-group">
          <span class="sat-enhance-label">Image B:</span>
          <button class="pill-chip sat-enhance-btn-b active" data-enhance="none">Normal</button>
          <button class="pill-chip sat-enhance-btn-b" data-enhance="invert">Invert</button>
          <button class="pill-chip sat-enhance-btn-b" data-enhance="grayscale">B/W</button>
          <button class="pill-chip sat-enhance-btn-b" data-enhance="contrast">Hi-Contrast</button>
          <button class="pill-chip sat-enhance-btn-b" data-enhance="saturate">Saturate</button>
          <button class="pill-chip sat-enhance-btn-b" data-enhance="edge">Edge</button>
          <button class="pill-chip sat-enhance-btn-b" data-enhance="block">Block</button>
        </div>
      </div>
    </section>

    <!-- Map -->
    <section class="intel-section">
      <div class="sat-map-container" id="satMapContainer">
        <div id="satMap" style="width:100%;height:100%;"></div>
      </div>
      <div class="sat-map-info">
        <span id="satMapCenter">—</span>
        <span id="satMapZoom">—</span>
        <span id="satImageryStatus">No imagery loaded</span>
      </div>
    </section>

  </main>

  <!-- Coordinate display (fixed, follows cursor context) -->
  <div class="sat-coord-display" id="satCoordDisplay">
    <span id="satCoordLat">—</span>, <span id="satCoordLon">—</span>
    <span class="sat-coord-hint">Click to pin</span>
  </div>

  <!-- Floating pin collection panel -->
  <div class="fp sat-pins-panel hidden" id="satPinsPanel" data-panel-id="sat-pins">
    <div class="fp-header">
      <span class="fp-title">Pinned Locations</span>
      <span class="fp-count" id="satPinCount">0</span>
      <button class="fp-close" id="satPinsClose">&times;</button>
    </div>
    <div class="fp-body" id="satPinsList"></div>
    <div class="sat-pins-footer">
      <button class="pill-chip" id="satPinsExportCsv">Export CSV</button>
      <button class="pill-chip" id="satPinsToKg">All to KG</button>
    </div>
  </div>
  <button class="edge-tab edge-tab-right sat-pins-toggle" id="satPinsToggle" title="Pinned Locations">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    <span id="satPinsToggleCount"></span>
  </button>

  <div id="argus-chat-container" style="padding:16px 20px;"></div>

  <script src="../lib/vendor/leaflet.js"></script>
  <script src="../lib/vendor/purify.min.js"></script>
  <script src="../lib/vendor/marked.min.js"></script>
  <script src="../shared/text-it.js"></script>
  <script src="../shared/xmpp-chat.js"></script>
  <script src="../lib/argus-chat.js"></script>
  <script src="domain-shell.js"></script>
  <script>IntelDomainShell.init("satellite", ["sentinelhub"]);</script>
  <script src="satellite.js"></script>
  <div id="xmpp-chat-container"></div>
  <script>
    if (typeof XmppChat !== "undefined") {
      XmppChat.init({ container: document.getElementById("xmpp-chat-container"), pageId: "intel-satellite" });
    }
  </script>
</body>
</html>
