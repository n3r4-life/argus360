<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workbench - Argus</title>
  <link rel="stylesheet" href="workbench.css">
  <link rel="stylesheet" href="../shared/ribbon.css">
  <link rel="stylesheet" href="../lib/email-share.css">
</head>
<body>
  <script src="../shared/ribbon.js"></script>
  <div class="wb-layout">
    <!-- Left: Project Tree -->
    <aside class="wb-tree" id="wb-tree">
      <div class="wb-tree-header">
        <img src="../icons/icon-32.png" alt="" class="wb-icon">
        <span class="wb-tree-title">Workbench</span>
      </div>
      <div class="wb-project-select">
        <select id="wb-project" title="Select project">
          <option value="">Select a project...</option>
        </select>
      </div>
      <div class="wb-tree-body" id="wb-tree-body">
        <div class="wb-tree-empty">Select a project to load its data.</div>
      </div>
      <div class="wb-tree-footer">
        <button id="wb-select-all" class="wb-btn-sm">Select All</button>
        <button id="wb-clear-surface" class="wb-btn-sm">Clear Surface</button>
      </div>
    </aside>

    <!-- Center: Work Surface -->
    <main class="wb-surface">
      <div class="wb-surface-header">
        <span class="wb-surface-title" id="wb-surface-title">Work Surface</span>
        <span class="wb-surface-stats" id="wb-surface-stats"></span>
      </div>
      <div class="wb-surface-body" id="wb-surface-body">
        <div class="wb-surface-empty" id="wb-surface-empty">
          <div class="wb-surface-empty-icon">&#128203;</div>
          <h3>Drop zone</h3>
          <p>Click items in the project tree to place them here. Select multiple items, then analyze them together with AI.</p>
        </div>
      </div>
    </main>

    <!-- Right: AI Panel -->
    <aside class="wb-ai" id="wb-ai">
      <div class="wb-ai-header">
        <span class="wb-ai-title">AI Analysis</span>
        <select id="wb-provider" title="AI Provider">
          <option value="">Default</option>
          <option value="xai">Grok</option>
          <option value="openai">OpenAI</option>
          <option value="anthropic">Claude</option>
          <option value="gemini">Gemini</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div class="wb-ai-prompt">
        <textarea id="wb-prompt" placeholder="Custom prompt (optional)... e.g. 'Cross-reference these entities and identify hidden relationships'" rows="3"></textarea>
      </div>
      <div class="wb-ai-actions">
        <button id="wb-analyze" class="wb-analyze-btn">Analyze Selection</button>
        <button id="wb-save-result" class="wb-btn-sm" style="display:none;">+ Save to Project</button>
      </div>
      <div class="wb-ai-status" id="wb-ai-status"></div>
      <div class="wb-ai-result" id="wb-ai-result">
        <div class="wb-ai-result-empty">Analysis results will appear here.</div>
      </div>
      <div class="wb-ai-result-actions" id="wb-result-actions" style="display:none;">
        <button id="wb-copy-result" class="wb-btn-sm">Copy</button>
        <button id="wb-export-result" class="wb-btn-sm">Export .md</button>
        <button id="wb-email-result" class="wb-btn-sm">Email+</button>
      </div>
    </aside>
  </div>

  <script src="../lib/purify.min.js"></script>
  <script src="../lib/marked.min.js"></script>
  <script src="../lib/export-utils.js"></script>
  <script src="../lib/intelligence-viewer.js"></script>
  <script src="../lib/email-share.js"></script>
  <script src="workbench.js"></script>
</body>
</html>
