<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Feeds - Argus</title>
  <link rel="stylesheet" href="feeds.css">
  <link rel="stylesheet" href="../shared/argus-std.css">
  <link rel="stylesheet" href="../shared/ribbon.css">
</head>
<body>
  <script src="../shared/ribbon.js"></script>
  <header class="header">
    <div class="header-left">
      <img src="../icons/icon-32.png" alt="" class="header-icon">
      <h1 class="header-title">RSS Feeds</h1>
    </div>
    <div class="header-right">
      <button id="mark-all-read" class="btn btn-secondary btn-small">Mark All Read</button>
      <button id="refresh-feeds" class="btn btn-secondary btn-small">Refresh</button>
      <a href="../options/options.html#feeds" class="btn btn-secondary btn-small back-link">Settings</a>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="feed-list-header">
        <h3 class="sidebar-heading">Feeds</h3>
      </div>
      <div id="feed-list" class="feed-list">
        <div class="loading-text">Loading feeds...</div>
      </div>
    </aside>

  <!-- Background watermark -->
  <svg style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:320px;height:320px;opacity:0.07;pointer-events:none;z-index:0;color:#6a6a80;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.5"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>

    <main class="main-content">
      <div id="entries-header" class="entries-header">
        <h2 id="current-feed-title" class="current-feed-title">All Feeds</h2>
        <span id="entry-count" class="entry-count"></span>
      </div>
      <div id="entry-list" class="entry-list">
        <div class="loading-text">Loading entries...</div>
      </div>
      <div id="empty-state" class="empty-state hidden">
        <p>No feed entries yet. Add RSS feeds in <strong>Settings</strong> to get started.</p>
      </div>
    </main>
  </div>

  <script src="feeds.js"></script>
</body>
</html>
