<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <h1 class="header-title">Argus</h1>
    <div style="display:flex;gap:4px;align-items:center;">
      <button id="open-bookmarks" class="icon-btn" title="Smart Bookmarks">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
      <button id="open-monitors" class="icon-btn" title="Page Monitors">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
      <button id="open-projects" class="icon-btn" title="Projects">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
      </button>
      <button id="open-osint" class="icon-btn" title="OSINT Dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button id="open-feeds" class="icon-btn icon-btn-accent" title="Feed Reader">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/>
        </svg>
      </button>
      <button id="toggle-redirect" class="icon-btn" title="Toggle Archive Redirect">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
      </button>
      <button id="open-history" class="icon-btn" title="Analysis History">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </button>
      <button id="open-options" class="icon-btn" title="Argus Console">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button id="settings-toggle" class="icon-btn" title="Quick Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0
                   0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33
                   1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65
                   1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2
                   2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15
                   1.65 1.65 0 0 0 3.17 14H3a2 2 0 0 1 0-4h.09A1.65
                   1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2
                   2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68 1.65
                   1.65 0 0 0 10 3.17V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0
                   0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1
                   2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0
                   0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Settings panel (hidden by default) -->
  <section id="settings-panel" class="settings-panel hidden">
    <div class="form-group">
      <label for="provider-select">AI Provider</label>
      <select id="provider-select">
        <option value="xai">xAI (Grok)</option>
        <option value="openai">OpenAI</option>
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="gemini">Google (Gemini)</option>
        <option value="custom">Custom (OpenAI-compatible)</option>
      </select>
    </div>
    <div class="form-group">
      <label for="api-key">API Key</label>
      <div class="input-row">
        <input type="password" id="api-key" placeholder="Enter API key...">
        <button id="toggle-key-visibility" class="icon-btn" title="Show/hide key">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="form-group">
      <label for="model-select">Model</label>
      <select id="model-select"></select>
    </div>
    <div class="form-group">
      <button id="save-settings" class="btn btn-secondary">Save Settings</button>
    </div>
    <div id="settings-status" class="status-msg"></div>
  </section>

  <!-- Previous analysis indicator -->
  <div id="prev-analysis" class="prev-analysis hidden"></div>
  <!-- Archive availability indicator -->
  <div id="archive-available" class="archive-available hidden"></div>
  <!-- Wayback availability indicator -->
  <div id="wayback-available" class="archive-available hidden"></div>

  <!-- Main analysis panel -->
  <section id="analysis-panel">
    <div class="form-group">
      <div class="provider-row">
        <select id="analysis-type" class="flex-grow"></select>
        <select id="analysis-provider" title="Choose AI provider for this analysis">
          <option value="">Default</option>
          <option value="xai">Grok</option>
          <option value="openai">OpenAI</option>
          <option value="anthropic">Claude</option>
          <option value="gemini">Gemini</option>
          <option value="custom">Custom</option>
        </select>
      </div>
    </div>

    <div id="custom-prompt-group" class="form-group hidden">
      <label for="custom-prompt">Custom Prompt</label>
      <textarea id="custom-prompt" rows="3"
                placeholder="Enter your custom analysis instruction... Use {title}, {url}, {domain}, {date}, {wordcount} as variables."></textarea>
    </div>

    <!-- Mode toggles -->
    <div class="mode-toggles">
      <button id="mode-selection" class="mode-btn" title="Analyze selected text only">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 7V4h3"/><path d="M20 7V4h-3"/><path d="M4 17v3h3"/><path d="M20 17v3h-3"/>
          <line x1="9" y1="12" x2="15" y2="12"/>
        </svg>
        <span>Selection</span>
      </button>
      <button id="mode-compare" class="mode-btn" title="Compare results across providers">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="8" height="18" rx="1"/><rect x="13" y="3" width="8" height="18" rx="1"/>
        </svg>
        <span>Compare</span>
      </button>
      <button id="mode-multipage" class="mode-btn" title="Analyze multiple open tabs">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <span>Multi-Page</span>
      </button>
      <button id="mode-auto" class="mode-btn" title="Auto-analyze pages on this site">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        <span>Auto</span>
      </button>
    </div>

    <!-- Compare provider checkboxes (hidden by default) -->
    <div id="compare-panel" class="compare-panel hidden">
      <label class="compare-label">Select providers to compare:</label>
      <div class="compare-checks">
        <label><input type="checkbox" value="xai" checked> Grok</label>
        <label><input type="checkbox" value="openai"> OpenAI</label>
        <label><input type="checkbox" value="anthropic"> Claude</label>
        <label><input type="checkbox" value="gemini"> Gemini</label>
        <label><input type="checkbox" value="custom"> Custom</label>
      </div>
    </div>

    <!-- Multi-page tab picker (hidden by default) -->
    <div id="multipage-panel" class="multipage-panel hidden">
      <label class="compare-label">Select tabs to analyze:</label>
      <div id="tab-list" class="tab-picker-list"></div>
    </div>

    <!-- Selection info -->
    <div id="selection-info" class="selection-info hidden">
      <span id="selection-text-preview"></span>
    </div>

    <div class="form-group btn-row btn-row-equal">
      <button id="analyze-btn" class="btn btn-primary">
        <span class="btn-text">Analyze This Page</span>
        <span class="btn-spinner hidden"></span>
      </button>
      <button id="monitor-btn" class="btn btn-secondary" title="Monitor this page for changes">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>Monitor</span>
      </button>
      <button id="bookmark-btn" class="btn btn-secondary" title="Bookmark with AI tags">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        <span>Bookmark</span>
      </button>
    </div>

    <!-- OSINT Quick Tools -->
    <div class="form-group btn-row osint-tools-row">
      <button id="osint-metadata" class="btn btn-osint" title="Extract page metadata, OG tags, JSON-LD">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span>Meta</span>
      </button>
      <button id="osint-links" class="btn btn-osint" title="Map all links on this page">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <span>Links</span>
      </button>
      <button id="osint-whois" class="btn btn-osint" title="Whois & DNS lookup for this domain">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span>Whois</span>
      </button>
      <button id="osint-techstack" class="btn btn-osint" title="Detect website technologies">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="4" y="4" width="16" height="16" rx="2"/><line x1="4" y1="10" x2="20" y2="10"/><line x1="10" y1="4" x2="10" y2="20"/>
        </svg>
        <span>T-Stack</span>
      </button>
      <button id="osint-archive" class="btn btn-osint" title="Check archive.is for a saved version">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/>
        </svg>
        <span>Archive</span>
      </button>
      <button id="osint-wayback" class="btn btn-osint" title="Check Wayback Machine for snapshots">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Wayback</span>
      </button>
    </div>

    <!-- Error display -->
    <div id="error-container" class="hidden">
      <p id="error-message" class="error-text"></p>
    </div>
  </section>

  <!-- Toast notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="popup.js"></script>
</body>
</html>
