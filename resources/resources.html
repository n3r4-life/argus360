<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resources - Argus</title>
  <link rel="stylesheet" href="../shared/argus-std.css">
  <link rel="stylesheet" href="../shared/ribbon.css">
  <link rel="stylesheet" href="../shared/options-ui.css">
  <link rel="stylesheet" href="resources.css">
</head>
<body>
  <script src="../lib/vendor/browser-polyfill.min.js"></script>
  <script src="../shared/theme.js"></script>
  <script src="../shared/ribbon.js"></script>

  <div class="settings-container" style="padding-top: 12px;">

    <!-- IP Bar + Update controls -->
    <div class="res-toolbar">
      <div class="res-ip-row">
        <span class="res-ip-label">Your IP:</span>
        <code id="res-ip-value">—</code>
        <button id="res-ip-copy" class="pill-chip" title="Copy IP">Copy</button>
        <button id="res-ip-refresh" class="pill-chip" title="Refresh IP">Refresh</button>
      </div>
      <div class="res-update-row">
        <span id="res-version-info" class="res-version-info"></span>
        <button id="res-check-updates" class="pill-chip">Check for Updates</button>
        <button id="res-reset-stock" class="pill-chip" style="display:none;">Reset to Bundled</button>
      </div>
    </div>

    <!-- Custom links display (top, hidden if empty) -->
    <div id="res-custom-top" class="res-custom-top" style="display:none;">
      <div class="res-custom-top-header">
        <h3 class="res-custom-top-title">My Links</h3>
        <a href="#res-custom-add-section" id="res-custom-add-link" class="res-custom-add-link">+ Add more</a>
      </div>
      <div id="res-custom-top-links" class="resource-links"></div>
    </div>

    <!-- Dynamic resource cards grid -->
    <div id="res-grid" class="res-grid">
      <div class="loading-text">Loading resources...</div>
    </div>

    <!-- Custom links management (bottom) -->
    <section id="res-custom-add-section" class="card" style="margin-top:16px;">
      <h2 class="card-title">Manage My Links</h2>
      <div class="card-body">
        <div id="res-custom-sources" style="margin-bottom:12px;"></div>
        <div class="form-row" style="gap:8px;align-items:flex-end;">
          <div class="form-group flex-2" style="margin:0;">
            <label for="res-custom-url" style="font-size:11px;">URL</label>
            <input type="text" id="res-custom-url" placeholder="https://..." style="font-size:12px;padding:4px 8px;">
          </div>
          <div class="form-group flex-1" style="margin:0;">
            <label for="res-custom-label" style="font-size:11px;">Label</label>
            <input type="text" id="res-custom-label" placeholder="Name" style="font-size:12px;padding:4px 8px;">
          </div>
          <div class="form-group flex-2" style="margin:0;">
            <label for="res-custom-desc" style="font-size:11px;">Description</label>
            <input type="text" id="res-custom-desc" placeholder="Short description..." style="font-size:12px;padding:4px 8px;">
          </div>
          <button id="res-custom-add" class="pill-chip btn-primary" style="padding:4px 12px;font-size:12px;white-space:nowrap;">+ Add</button>
        </div>
      </div>
    </section>

    <!-- Companion Extensions -->
    <div class="res-companions" style="margin-top:20px;">
      <p class="res-companions-disclaimer">Argus is not affiliated with or endorsed by these projects. We simply recommend them as useful companions for research workflows.</p>
      <div class="res-companions-row">
        <a href="https://addons.mozilla.org/en-US/firefox/addon/ublock-origin/" target="_blank" class="res-companion" title="uBlock Origin — Cleaner pages mean better analysis">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span>uBlock Origin</span>
        </a>
        <a href="https://addons.mozilla.org/en-US/firefox/addon/darkreader/" target="_blank" class="res-companion" title="Dark Reader — Easier on the eyes during long research sessions">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span>Dark Reader</span>
        </a>
        <a href="https://addons.mozilla.org/en-US/firefox/addon/single-file/" target="_blank" class="res-companion" title="SingleFile — Save complete offline page copies">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>SingleFile</span>
        </a>
        <a href="https://addons.mozilla.org/en-US/firefox/addon/violentmonkey/" target="_blank" class="res-companion" title="Violentmonkey — Custom userscripts for advanced extraction">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          <span>Violentmonkey</span>
        </a>
        <a href="https://addons.mozilla.org/en-US/firefox/addon/cookie-autodelete/" target="_blank" class="res-companion" title="Cookie AutoDelete — Fresh sessions between research contexts">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
          <span>Cookie AutoDelete</span>
        </a>
      </div>
    </div>

  </div>

  <script src="resources.js"></script>
</body>
</html>
