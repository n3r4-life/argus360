<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis History - Argus</title>
  <link rel="stylesheet" href="history.css">
  <link rel="stylesheet" href="../shared/ribbon.css">
</head>
<body>
  <script src="../shared/ribbon.js"></script>
  <header class="header">
    <div class="header-left">
      <img src="../icons/icon-32.png" alt="" class="header-icon">
      <h1 class="header-title">History</h1>
    </div>
    <div class="header-actions">
      <input type="text" id="search-input" placeholder="Search history..." class="search-input">
      <button id="clear-all" class="btn btn-secondary btn-small">Clear All</button>
      <button id="clear-monitor-changes" class="btn btn-secondary btn-small" style="display:none;">Clear All</button>
    </div>
  </header>

  <div class="history-tabs">
    <button class="history-tab active" data-tab="analysis">Analysis</button>
    <button class="history-tab" data-tab="monitors">Monitor Changes</button>
  </div>

  <div id="history-list" class="history-list">
    <div class="loading-text">Loading history...</div>
  </div>

  <div id="monitor-changes-list" class="history-list" style="display:none;">
    <div class="loading-text">Loading monitor changes...</div>
  </div>

  <div id="detail-overlay" class="detail-overlay hidden">
    <div class="detail-panel">
      <div class="detail-header">
        <div>
          <h2 id="detail-title" class="detail-title"></h2>
          <a id="detail-url" class="detail-url" href="#" target="_blank"></a>
        </div>
        <button id="detail-close" class="btn btn-secondary btn-small">Close</button>
      </div>
      <div class="detail-meta" id="detail-meta"></div>
      <div id="detail-thinking" class="detail-thinking hidden">
        <h3>Thinking</h3>
        <pre id="detail-thinking-content"></pre>
      </div>
      <div id="detail-content" class="detail-content markdown-body"></div>
      <div class="detail-actions">
        <button id="detail-copy" class="btn btn-secondary btn-small">Copy Markdown</button>
        <button id="detail-export-md" class="btn btn-secondary btn-small">Export .md</button>
        <button id="detail-export-html" class="btn btn-secondary btn-small">Export .html</button>
        <button id="detail-export-txt" class="btn btn-secondary btn-small">Export .txt</button>
        <button id="detail-print" class="btn btn-secondary btn-small">Print</button>
        <button id="detail-add-project" class="btn btn-secondary btn-small" style="position:relative;">+ Project</button>
        <button id="detail-delete" class="btn btn-secondary btn-small" style="color:#ff5252;">Delete</button>
      </div>
      <div class="detail-actions detail-share-row">
        <span class="share-label">Share:</span>
        <button id="detail-share-x" class="btn btn-secondary btn-small">X</button>
        <button id="detail-share-reddit" class="btn btn-secondary btn-small">Reddit</button>
        <button id="detail-share-linkedin" class="btn btn-secondary btn-small">LinkedIn</button>
        <button id="detail-share-email" class="btn btn-secondary btn-small">Email</button>
      </div>
    </div>
  </div>

  <script src="../lib/purify.min.js"></script>
  <script src="../lib/marked.min.js"></script>
  <script src="../lib/export-utils.js"></script>
  <script src="../lib/intelligence-viewer.js"></script>
  <script src="history.js"></script>
</body>
</html>
