<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connection Graph - Argus OSINT</title>
  <link rel="stylesheet" href="graph.css">
  <link rel="stylesheet" href="../lib/argus-chat.css">
  <link rel="stylesheet" href="../shared/ribbon.css">
</head>
<body>
  <script src="../shared/ribbon.js"></script>
  <script src="../shared/panel-state.js"></script>
  <header class="graph-header">
    <div class="header-left">
      <svg class="header-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <h1 class="project-title">OSINT</h1>
      <span class="project-name" id="projectName">Connection Graph</span>
      <div class="mode-toggle" id="modeToggle">
        <button class="mode-btn active" data-mode="project">Project</button>
        <button class="mode-btn" data-mode="global">Global KG</button>
      </div>
      <span class="header-sep"></span>
      <button id="addToProjectBtn" class="kg-header-btn" title="Add data to a project">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        To Project
      </button>
      <button id="overlaySourcesBtn" class="kg-header-btn" title="Cross-reference Sources with KG entities">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Sources
      </button>
      <button id="exportPng" class="kg-header-btn" title="Export graph as PNG">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
    </div>
    <div class="header-controls">
      <div class="filter-group">
        <label class="filter-checkbox">
          <input type="checkbox" data-type="person" checked>
          <span class="filter-dot" style="background:#e94560"></span>
          People
        </label>
        <label class="filter-checkbox">
          <input type="checkbox" data-type="organization" checked>
          <span class="filter-dot" style="background:#64b5f6"></span>
          Orgs
        </label>
        <label class="filter-checkbox">
          <input type="checkbox" data-type="location" checked>
          <span class="filter-dot" style="background:#4caf50"></span>
          Places
        </label>
        <label class="filter-checkbox">
          <input type="checkbox" data-type="date" checked>
          <span class="filter-dot" style="background:#ffb74d"></span>
          Dates
        </label>
        <label class="filter-checkbox">
          <input type="checkbox" data-type="other" checked>
          <span class="filter-dot" style="background:#a0a0b0"></span>
          Other
        </label>
      </div>
      <div class="zoom-controls">
        <button id="zoomIn" title="Zoom in">+</button>
        <button id="zoomReset" title="Reset zoom">Reset</button>
        <button id="zoomOut" title="Zoom out">&minus;</button>
      </div>
      <input type="text" id="graphSearch" class="graph-search" placeholder="Search entities...">
    </div>
  </header>

  <!-- Project overlay panel -->
  <div class="project-panel hidden" id="projectPanel">
    <div class="project-panel-header">
      <span class="project-panel-title">Projects</span>
      <button class="project-panel-close" id="projectPanelClose">&times;</button>
    </div>
    <div class="project-panel-body" id="projectPanelBody">
      <label class="project-toggle">
        <input type="checkbox" id="projToggleAll" checked>
        <span class="project-dot" style="background:var(--text-secondary)"></span>
        <span class="project-toggle-label">All (unassigned)</span>
      </label>
    </div>
  </div>
  <button class="project-panel-tab" id="projectPanelToggle" title="Toggle project filter">
    <span class="tab-icon">&#9776;</span>
  </button>

  <main class="graph-container">
    <div class="graph-motto">Cum hoc ergo propter hoc</div>
    <canvas id="graphCanvas"></canvas>
  </main>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2 id="sidebarTitle">Node Details</h2>
      <button id="sidebarClose" class="sidebar-close">&times;</button>
    </div>
    <div class="sidebar-body">
      <div class="detail-section hidden" id="detailSourceSection">
        <h3>Matched Source</h3>
        <div id="detailSourceInfo" class="source-match-info"></div>
      </div>
      <div class="detail-row">
        <span class="detail-label">Type</span>
        <span class="detail-value" id="detailType">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Mentions</span>
        <span class="detail-value" id="detailCount">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Connections</span>
        <span class="detail-value" id="detailConnections">-</span>
      </div>
      <div class="detail-row kg-detail hidden" id="detailAliasesRow">
        <span class="detail-label">Aliases</span>
        <span class="detail-value" id="detailAliases">-</span>
      </div>
      <div class="detail-row kg-detail hidden" id="detailFirstSeenRow">
        <span class="detail-label">First Seen</span>
        <span class="detail-value" id="detailFirstSeen">-</span>
      </div>
      <div class="detail-section">
        <h3>Appears On</h3>
        <ul id="detailPages" class="page-list"></ul>
      </div>
      <div class="detail-section">
        <h3>Connected Entities</h3>
        <ul id="detailEdges" class="edge-list"></ul>
      </div>
    </div>
  </aside>

  <button class="sidebar-toggle-tab" id="sidebarToggle" title="Toggle details panel">
    <span class="tab-arrow">&#9654;</span>
  </button>

  <div id="argus-chat-container" style="padding:16px 20px;"></div>

  <!-- ── Asset Library panel ── -->
  <div class="kg-assets-panel hidden" id="kgAssetsPanel">
    <div class="kg-assets-header">
      <span class="kg-assets-title">Asset Library</span>
      <button class="kg-assets-close" id="kgAssetsClose">&times;</button>
    </div>
    <div class="kg-assets-search-row">
      <input type="text" id="kgAssetSearch" class="kg-assets-search" placeholder="Search assets...">
    </div>
    <div class="kg-assets-tabs" id="kgAssetTabs">
      <button class="kg-asset-tab active" data-tab="analyses">Analyses</button>
      <button class="kg-asset-tab" data-tab="bookmarks">Bookmarks</button>
      <button class="kg-asset-tab" data-tab="monitors">Monitors</button>
      <button class="kg-asset-tab" data-tab="feeds">Feeds</button>
      <button class="kg-asset-tab" data-tab="techstack">TechStack</button>
      <button class="kg-asset-tab" data-tab="snapshots">Snapshots</button>
      <button class="kg-asset-tab" data-tab="timeline">Timeline</button>
    </div>
    <div class="kg-assets-list" id="kgAssetsList"></div>
  </div>
  <button class="kg-assets-toggle" id="kgAssetsToggle" title="Asset Library">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    <span id="kgAssetCount"></span>
  </button>

  <script src="../lib/purify.min.js"></script>
  <script src="../lib/marked.min.js"></script>
  <script src="../lib/argus-chat.js"></script>
  <script src="graph.js"></script>
</body>
</html>
