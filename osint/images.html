<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Argus - Image Grabber</title>
  <link rel="stylesheet" href="../shared/argus-std.css">
  <link rel="stylesheet" href="images.css">
  <link rel="stylesheet" href="../lib/argus-chat.css">
  <link rel="stylesheet" href="../shared/ribbon.css">
  <link rel="stylesheet" href="../shared/text-it.css">
  <link rel="stylesheet" href="../shared/xmpp-chat.css">
</head>
<body>
  <script src="../shared/ribbon.js"></script>
  <script src="../shared/panel-state.js"></script>
  <header class="header">
    <div class="header-left">
      <img src="../icons/icon-32.png" alt="" class="header-icon">
      <h1 class="header-title">Image Grabber</h1>
      <select id="project-select" class="select-compact header-project-select" title="Active project context for AI chat">
        <option value="">No project</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
      <!-- Data IO / cross-data actions (tool-chips with icons) -->
      <button id="download-selected" class="tool-chip" disabled title="Download selected images"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download</button>
      <button id="export-urls" class="tool-chip" title="Export image URLs"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> URLs</button>
      <button id="save-to-cloud" class="tool-chip" disabled title="Save selected to cloud"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/></svg> + Cloud</button>
      <button id="insert-to-draft" class="tool-chip" disabled title="Insert image links into Draft Pad"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> + Draft</button>
      <button id="add-to-project" class="tool-chip" disabled title="Add selected images to a project"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg> + Project</button>
      <button id="compare-selected" class="tool-chip" disabled title="Compare selected side-by-side"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg> Compare</button>
      <a id="page-url" class="page-url" href="#" target="_blank" title="Open source page"></a>
      <button id="refresh-gallery" class="pill-chip" title="Re-grab images from source tabs" style="background:rgba(100,180,255,0.15);color:#64b4ff;border-color:rgba(100,180,255,0.3);">Refresh</button>
      <button id="clear-gallery" class="pill-chip" title="Clear gallery and start fresh">Clear</button>
    </div>
  </header>

  <section id="stats-bar" class="stats-bar">
    <div class="stat-badge">
      <span class="stat-value" id="stat-total">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat-badge">
      <span class="stat-value" id="stat-img">0</span>
      <span class="stat-label">IMG</span>
    </div>
    <div class="stat-badge">
      <span class="stat-value" id="stat-css">0</span>
      <span class="stat-label">CSS BG</span>
    </div>
    <div class="stat-badge">
      <span class="stat-value" id="stat-meta">0</span>
      <span class="stat-label">Meta/Icon</span>
    </div>
    <div class="stat-badge">
      <span class="stat-value" id="stat-selected">0</span>
      <span class="stat-label">Selected</span>
    </div>
  </section>

  <!-- Multi-tab selector subheader (shown when images from multiple tabs) -->
  <div class="tab-selector-bar hidden" id="tabSelectorBar">
    <span class="filter-label">Tabs</span>
    <div class="tab-selector-checks" id="tabSelectorChecks"></div>
  </div>

  <div class="img-search-bar" id="img-search-bar">
    <input type="text" id="img-search-input" class="img-search-input" placeholder="Search by filename, alt text, or URL..." spellcheck="false">
    <button class="img-search-mode" id="img-search-mode" title="Toggle regex mode">RE</button>
    <span class="img-search-count" id="img-search-count"></span>
  </div>

  <div class="display-bar">
    <span class="filter-label">Display</span>
    <div class="display-group">
      <span class="display-group-label">Background</span>
      <button class="bg-swatch active" data-bg="default" title="Default dark"><span style="background:#1a1a2e"></span></button>
      <button class="bg-swatch" data-bg="white" title="White"><span style="background:#ffffff"></span></button>
      <button class="bg-swatch" data-bg="light" title="Light gray"><span style="background:#d0d0d0"></span></button>
      <button class="bg-swatch" data-bg="mid" title="Mid gray"><span style="background:#808080"></span></button>
      <button class="bg-swatch" data-bg="black" title="Black"><span style="background:#000000"></span></button>
      <button class="bg-swatch" data-bg="checker" title="Checkerboard (transparency)"><span class="checker-swatch"></span></button>
    </div>
    <div class="display-group">
      <span class="display-group-label">Filter</span>
      <label class="toggle-switch" id="filter-toggle" title="Toggle image filter on/off">
        <input type="checkbox" id="filter-toggle-cb">
        <span class="toggle-track"><span class="toggle-knob"></span></span>
      </label>
      <button class="pill-chip" data-filter="sepia" title="Sepia / warm tone">Sepia</button>
      <button class="pill-chip" data-filter="grayscale" title="Grayscale">Gray</button>
      <button class="pill-chip" data-filter="invert" title="Invert colors">Invert</button>
      <button class="pill-chip" data-filter="warm" title="Blue light filter (warm)">Warm</button>
      <button class="pill-chip" data-filter="cool" title="Cool / blue shift">Cool</button>
      <button class="pill-chip" data-filter="highcontrast" title="High contrast">Hi-Con</button>
    </div>
    <div class="display-group">
      <span class="display-group-label">Brightness</span>
      <input type="range" id="brightness-slider" min="50" max="200" value="100" class="display-slider" title="Brightness">
      <span id="brightness-val" class="slider-val">100%</span>
    </div>
    <div class="display-group">
      <span class="display-group-label">Selection</span>
      <button id="select-all" class="pill-chip" title="Select all images"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Select All</button>
      <button id="deselect-all" class="pill-chip" title="Deselect all"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Deselect</button>
      <button id="show-selected-only" class="pill-chip" title="Show only selected images"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="9 11 12 14 22 4"/></svg> Selected</button>
    </div>
  </div>

  <!-- Filters & Actions floating panel -->
  <div class="fp hidden" id="actionsPanel" data-panel-id="actions">
    <div class="fp-header">
      <span class="fp-title">Filter Controls</span>
      <span class="fp-count" id="actionsPanelCount"></span>
      <button class="pill-chip" id="resetFilters" title="Reset all filters" style="background:rgba(100,180,255,0.15);color:#64b4ff;border-color:rgba(100,180,255,0.3);font-size:10px;padding:2px 8px;">Refresh</button>
      <button class="fp-close" id="actionsPanelClose">&times;</button>
    </div>
    <div class="img-filter-summary" id="filterSummary"></div>
    <div class="fp-tabs">
      <button class="fp-tab active" data-ptab="source">Source</button>
      <button class="fp-tab" data-ptab="type">Type</button>
      <button class="fp-tab" data-ptab="color">Color</button>
      <button class="fp-tab" data-ptab="search">Search</button>
    </div>
    <!-- Tab: Source -->
    <div class="fp-pane active" data-ptab-pane="source">
      <div class="img-actions-group">
        <div class="filter-tabs" id="source-tabs">
          <button class="pill-chip active" data-filter="all">All</button>
          <button class="pill-chip" data-filter="img">IMG</button>
          <button class="pill-chip" data-filter="css-bg">CSS BG</button>
          <button class="pill-chip" data-filter="picture">Picture</button>
          <button class="pill-chip" data-filter="meta">Meta</button>
          <button class="pill-chip" data-filter="favicon">Icons</button>
          <button class="pill-chip" data-filter="video-poster">Posters</button>
        </div>
      </div>
      <div class="img-actions-group">
        <span class="img-actions-label">Size</span>
        <div class="filter-tabs" id="size-tabs">
          <button class="pill-chip active" data-size="all">All</button>
          <button class="pill-chip" data-size="small">Small</button>
          <button class="pill-chip" data-size="medium">Medium</button>
          <button class="pill-chip" data-size="big">Big</button>
          <button class="pill-chip" data-size="large">Large</button>
          <button class="pill-chip" data-size="min-100">100px+</button>
          <button class="pill-chip" data-size="min-200">200px+</button>
          <button class="pill-chip" data-size="min-400">400px+</button>
          <button class="pill-chip" data-size="min-800">800px+</button>
          <button class="pill-chip" data-size="max-100">&lt;100px</button>
          <button class="pill-chip" data-size="max-200">&lt;200px</button>
          <button class="pill-chip" data-size="max-400">&lt;400px</button>
        </div>
      </div>
    </div>
    <!-- Tab: Type -->
    <div class="fp-pane" data-ptab-pane="type">
      <div class="img-actions-group">
        <div class="filter-tabs" id="type-tabs">
          <button class="pill-chip active" data-type="all">All</button>
          <button class="pill-chip" data-type="jpg">JPG <span class="tab-count" id="count-jpg">0</span></button>
          <button class="pill-chip" data-type="png">PNG <span class="tab-count" id="count-png">0</span></button>
          <button class="pill-chip" data-type="gif">GIF <span class="tab-count" id="count-gif">0</span></button>
          <button class="pill-chip" data-type="webp">WebP <span class="tab-count" id="count-webp">0</span></button>
          <button class="pill-chip" data-type="svg">SVG <span class="tab-count" id="count-svg">0</span></button>
          <button class="pill-chip" data-type="avif">AVIF <span class="tab-count" id="count-avif">0</span></button>
          <button class="pill-chip" data-type="ico">ICO <span class="tab-count" id="count-ico">0</span></button>
          <button class="pill-chip" data-type="other">Other <span class="tab-count" id="count-other">0</span></button>
        </div>
      </div>
    </div>
    <!-- Tab: Color -->
    <div class="fp-pane" data-ptab-pane="color">
      <div class="img-actions-group">
        <div class="filter-tabs" id="color-tabs">
          <button class="color-tab active" data-color="all" title="All colors">All</button>
          <button class="color-tab" data-color="red" title="Red"><span class="color-dot" style="background:#e53935"></span></button>
          <button class="color-tab" data-color="orange" title="Orange"><span class="color-dot" style="background:#fb8c00"></span></button>
          <button class="color-tab" data-color="yellow" title="Yellow"><span class="color-dot" style="background:#fdd835"></span></button>
          <button class="color-tab" data-color="green" title="Green"><span class="color-dot" style="background:#43a047"></span></button>
          <button class="color-tab" data-color="cyan" title="Cyan"><span class="color-dot" style="background:#00acc1"></span></button>
          <button class="color-tab" data-color="blue" title="Blue"><span class="color-dot" style="background:#1e88e5"></span></button>
          <button class="color-tab" data-color="purple" title="Purple"><span class="color-dot" style="background:#8e24aa"></span></button>
          <button class="color-tab" data-color="pink" title="Pink"><span class="color-dot" style="background:#e91e8a"></span></button>
          <button class="color-tab" data-color="brown" title="Brown"><span class="color-dot" style="background:#795548"></span></button>
          <button class="color-tab" data-color="white" title="White"><span class="color-dot color-dot-white" style="background:#ffffff"></span></button>
          <button class="color-tab" data-color="gray" title="Gray"><span class="color-dot" style="background:#9e9e9e"></span></button>
          <button class="color-tab" data-color="black" title="Black"><span class="color-dot" style="background:#212121"></span></button>
          <span id="color-extract-status" class="color-extract-status"></span>
        </div>
      </div>
    </div>
    <!-- Tab: Search -->
    <div class="fp-pane" data-ptab-pane="search">
      <div class="img-actions-group">
        <input type="text" id="search-input" class="search-input" placeholder="Filter by alt text or URL..." style="width:100%;">
      </div>
      <div class="img-actions-group" style="gap:4px;">
        <select id="sort-by" class="select-compact">
          <option value="default">Sort: Default</option>
          <option value="size-desc">Largest first</option>
          <option value="size-asc">Smallest first</option>
          <option value="name-asc">Name A-Z</option>
          <option value="name-desc">Name Z-A</option>
          <option value="type">By type</option>
        </select>
        <label class="view-toggle" title="Toggle grid/list view">
          <input type="checkbox" id="view-list" hidden>
          <span id="view-icon">Grid</span>
        </label>
      </div>
    </div>
    <!-- Actions moved to header -->
  </div>
  <button class="edge-tab edge-tab-right" id="actionsTab" title="Controls">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
    <span class="img-actions-badge" id="actionsBadge"></span>
  </button>

  <!-- Session History floating panel -->
  <div class="fp hidden" id="historyPanel" data-panel-id="history" style="left:12px;right:auto;width:280px;">
    <div class="fp-header">
      <span class="fp-title">Session History</span>
      <button class="pill-chip" id="clearAllHistory" title="Clear all history" style="font-size:10px;padding:2px 8px;opacity:0.6;">Clear All</button>
      <button class="fp-close" id="historyPanelClose">&times;</button>
    </div>
    <div id="historyCount" style="padding:2px 10px 4px;font-size:10px;color:var(--text-muted);"></div>
    <div id="historyTimeline" style="padding:8px;overflow-y:auto;max-height:calc(100vh - 160px);display:flex;flex-direction:column;gap:0;"></div>
  </div>
  <button class="edge-tab edge-tab-left" id="historyTab" title="Session History">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
  </button>

  <main id="image-grid" class="image-grid">
    <div class="empty-state" id="empty-state">
      <p>Loading images...</p>
    </div>
  </main>

  <!-- Image Preview Modal -->
  <div id="preview-modal" class="preview-modal hidden">
    <div class="preview-backdrop"></div>
    <div class="preview-content">
      <button class="preview-close">&times;</button>
      <div class="preview-img-container" id="preview-img-container">
        <img id="preview-img" class="preview-img" alt="">
      </div>
      <div class="preview-toolbar">
        <div class="preview-zoom-controls">
          <button id="preview-zoom-out" class="btn btn-secondary btn-icon" title="Zoom out (-)">-</button>
          <span id="preview-zoom-level" class="preview-zoom-level">100%</span>
          <button id="preview-zoom-in" class="btn btn-secondary btn-icon" title="Zoom in (+)">+</button>
          <button id="preview-zoom-fit" class="btn btn-secondary" title="Fit to window">Fit</button>
          <button id="preview-zoom-actual" class="btn btn-secondary" title="Actual size (1:1)">1:1</button>
        </div>
        <div class="preview-filter-controls">
          <select id="preview-filter-select" class="select-compact" title="Image filter">
            <option value="none">Normal</option>
            <option value="sepia">Sepia</option>
            <option value="grayscale">Grayscale</option>
            <option value="invert">Invert</option>
            <option value="warm">Warm</option>
            <option value="cool">Cool</option>
            <option value="highcontrast">Hi-Contrast</option>
            <option value="saturate">Saturate</option>
            <option value="desaturate">Desaturate</option>
          </select>
          <input type="range" id="preview-brightness" min="20" max="300" value="100" class="display-slider" title="Brightness">
          <span id="preview-brightness-val" class="slider-val">100%</span>
          <input type="range" id="preview-contrast" min="20" max="300" value="100" class="display-slider" title="Contrast">
          <span id="preview-contrast-val" class="slider-val" style="min-width:20px">C:100%</span>
          <button id="preview-filter-reset" class="btn btn-secondary" title="Reset all adjustments">Reset</button>
        </div>
      </div>
      <div class="preview-info">
        <div id="preview-filename" class="preview-filename"></div>
        <div id="preview-dimensions" class="preview-dimensions"></div>
        <div id="preview-alt" class="preview-alt"></div>
        <div class="preview-actions">
          <a id="preview-open" class="btn btn-primary" href="#" target="_blank">Open Original</a>
          <a id="preview-download" class="btn btn-secondary" href="#" download>Download</a>
          <button id="preview-insert-draft" class="btn btn-secondary" title="Insert image link into Draft Pad">To Draft</button>
          <button id="preview-insert-chat" class="btn btn-secondary" title="Insert image link into Chat">To Chat</button>
          <button id="preview-reverse-google" class="btn btn-secondary">Google Reverse</button>
          <button id="preview-reverse-tineye" class="btn btn-secondary">TinEye</button>
          <button id="preview-reverse-yandex" class="btn btn-secondary">Yandex</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Image Compare Modal -->
  <div id="compare-modal" class="compare-modal hidden">
    <div class="preview-backdrop"></div>
    <div class="compare-content">
      <button class="preview-close" id="compare-close">&times;</button>
      <div class="compare-toolbar">
        <button class="btn btn-secondary active" id="compare-side" data-mode="side">Side by Side</button>
        <button class="btn btn-secondary" id="compare-overlay" data-mode="overlay">Overlay</button>
        <button class="btn btn-secondary" id="compare-diff" data-mode="diff">Difference</button>
        <input type="range" id="compare-opacity" min="0" max="100" value="50" class="display-slider" title="Overlay opacity" style="display:none">
        <span id="compare-opacity-val" class="slider-val" style="display:none">50%</span>
      </div>
      <div class="compare-panels" id="compare-panels">
        <!-- Filled dynamically -->
      </div>
      <div class="compare-info" id="compare-info"></div>
    </div>
  </div>

  <div id="argus-chat-container" class="ig-chat-bar"></div>

  <script src="../lib/purify.min.js"></script>
  <script src="../lib/marked.min.js"></script>
  <script src="../shared/text-it.js"></script>
  <script src="../shared/xmpp-chat.js"></script>
  <script src="../lib/argus-chat.js"></script>
  <script src="images.js"></script>
  <div id="xmpp-chat-container"></div>
  <script>
    if (typeof XmppChat !== "undefined") {
      XmppChat.init({ container: document.getElementById("xmpp-chat-container"), pageId: "images" });
    }
  </script>
</body>
</html>
