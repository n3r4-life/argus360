<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Argus - Link Map</title>
  <link rel="stylesheet" href="../shared/argus-std.css">
  <link rel="stylesheet" href="link-map.css">
  <link rel="stylesheet" href="../lib/argus-chat.css">
  <link rel="stylesheet" href="../shared/ribbon.css">
  <link rel="stylesheet" href="../shared/text-it.css">
  <link rel="stylesheet" href="../shared/xmpp-chat.css">
</head>
<body>
  <script src="../shared/ribbon.js"></script>
  <script src="../shared/panel-state.js"></script>
  <header class="header">
    <div class="header-left">
      <img src="../icons/icon-32.png" alt="" class="header-icon">
      <h1 class="header-title">Link Map</h1>
      <select id="project-select" class="select-compact header-project-select" title="Active project context for AI chat">
        <option value="">No project</option>
      </select>
    </div>
    <div class="header-right">
      <button id="import-bookmarks-btn" class="pill-chip" title="Import bookmarks HTML file from any browser">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Import
      </button>
      <input type="file" id="import-bookmarks-file" accept=".html,.htm" style="display:none">
      <button id="history-btn" class="pill-chip" title="Browse previous link map scans">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
      </button>
      <a id="page-url" class="page-url" href="#" target="_blank" title="Open analyzed page"></a>
    </div>
  </header>

  <!-- Link Map History panel (floating) -->
  <div class="fp lm-history-panel hidden" id="historyOverlay">
    <div class="fp-header">
      <span class="fp-title">History</span>
      <span class="fp-count" id="historyCount"></span>
      <button class="fp-close" id="historyClose">&times;</button>
    </div>
    <div class="lm-history-search-row">
      <input type="text" id="historySearch" class="lm-history-search" placeholder="Filter by URL or title...">
    </div>
    <div class="lm-history-list" id="historyList">
      <div class="lm-history-empty">Loading...</div>
    </div>
  </div>
  <button class="edge-tab edge-tab-left" id="historyTab" title="Toggle history">
    <span>&#128218;</span>
  </button>

  <!-- Cache banner (hidden by default) -->
  <div class="cache-banner hidden" id="cacheBanner">
    <div class="cache-banner-left">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Cached version from <strong id="cacheDate"></strong></span>
    </div>
    <div class="cache-banner-right">
      <button class="pill-chip" id="cacheRefresh" title="Re-scan page and compare changes" style="background:rgba(100,180,255,0.15);color:#64b4ff;border-color:rgba(100,180,255,0.3);">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Refresh &amp; Compare
      </button>
    </div>
  </div>

  <!-- Diff summary (hidden by default) -->
  <div class="diff-banner hidden" id="diffBanner">
    <div class="diff-summary" id="diffSummary"></div>
    <div class="diff-toggle-row">
      <button class="diff-toggle-btn active" id="diffShowCurrent" data-diffview="current">Current</button>
      <button class="diff-toggle-btn" id="diffShowChanges" data-diffview="changes">Changes Only</button>
    </div>
  </div>

  <section id="stats-bar" class="stats-bar">
    <div class="stat-badge">
      <span class="stat-value" id="stat-total">0</span>
      <span class="stat-label">Total Links</span>
    </div>
    <div class="stat-badge">
      <span class="stat-value" id="stat-domains">0</span>
      <span class="stat-label">Unique Domains</span>
    </div>
    <div class="stat-badge">
      <span class="stat-value" id="stat-external">0</span>
      <span class="stat-label">External</span>
    </div>
    <div class="stat-badge">
      <span class="stat-value" id="stat-internal">0</span>
      <span class="stat-label">Internal</span>
    </div>
  </section>

  <nav class="filter-tabs">
    <button class="pill-chip active" data-filter="all">All</button>
    <button class="pill-chip" data-filter="external">External</button>
    <button class="pill-chip" data-filter="internal">Internal</button>
    <button class="pill-chip" data-filter="social">Social</button>
    <button class="pill-chip" data-filter="emails">Email</button>
    <button class="pill-chip" data-filter="phones">Phone</button>
    <button class="pill-chip" data-filter="files">Files</button>
    <span style="width:1px;height:18px;background:var(--border);margin:0 4px;flex-shrink:0"></span>
    <span class="domain-pill-wrapper" style="position:relative">
      <button class="pill-chip" id="domains-pill" title="View domain breakdown">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
        Domains <span id="domains-pill-count" style="opacity:0.6"></span>
      </button>
      <div class="domain-breakdown hidden" id="domain-breakdown"></div>
    </span>
    <button class="pill-chip hidden" id="folders-pill" title="Group links by bookmark folder">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      Folders
    </button>
  </nav>

  <div class="actions-bar">
    <div class="actions-left">
      <div class="project-picker-wrapper">
        <button id="add-to-project" class="pill-chip" title="Add all links to a project">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          To Project
        </button>
        <div id="project-picker" class="project-picker hidden"></div>
      </div>
      <button id="export-csv" class="pill-chip" title="Export current view as CSV">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export View
      </button>
      <button id="xref-sources-btn" class="pill-chip" title="Cross-reference all links against your saved sources">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        X-Ref Sources
      </button>
      <button id="collect-all-btn" class="tool-chip" title="Add all visible links to collector">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
          <line x1="12" y1="22.08" x2="12" y2="12"/>
        </svg>
        Collect All
      </button>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="link-search" class="link-search-input" placeholder="Search links... supports: term1 | term2 &middot; /regex/ &middot; &quot;exact phrase&quot;">
    <button id="search-mode-toggle" class="search-mode-btn" title="Toggle regex mode">RE</button>
    <button id="search-clear" class="pill-chip" title="Clear search">Clear</button>
    <span id="search-count" class="search-count"></span>
  </div>

  <main id="link-list" class="link-list">
    <div class="empty-state" id="empty-state">
      <p>Loading link data...</p>
    </div>
  </main>

  <div id="argus-chat-container" class="lm-chat-bar"></div>

  <!-- ── Collector panel (floating) ── -->
  <button class="collector-tab" id="collectorTab" title="Collector">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
      <line x1="12" y1="22.08" x2="12" y2="12"/>
    </svg>
    <span class="collector-badge" id="collectorBadge"></span>
  </button>

  <div class="collector-panel hidden" id="collectorPanel">
    <div class="collector-header" id="collectorDragHandle">
      <span class="collector-title">Collector</span>
      <div class="collector-header-actions">
        <button class="collector-clear-btn" id="collectorClear" title="Clear all">Clear</button>
        <button class="collector-close-btn" id="collectorClose">&times;</button>
      </div>
    </div>
    <div class="collector-folder-row">
      <span class="collector-folder-label">📁</span>
      <select id="collectorFolder" class="collector-folder-select" title="Destination folder for sources">
        <option value="">No folder (ungrouped)</option>
      </select>
    </div>
    <div class="collector-search-row">
      <input type="text" id="collectorSearch" class="collector-search" placeholder="Filter collected...">
      <select id="collectorSort" class="collector-sort" title="Sort items">
        <option value="added">Recent</option>
        <option value="alpha">A &rarr; Z</option>
        <option value="type">By Type</option>
      </select>
    </div>
    <div class="collector-tabs">
      <button class="collector-tab-btn active" data-coltab="all">All</button>
      <button class="collector-tab-btn" data-coltab="emails">Email</button>
      <button class="collector-tab-btn" data-coltab="phones">Phone</button>
      <button class="collector-tab-btn" data-coltab="social">Social</button>
      <button class="collector-tab-btn" data-coltab="files">File</button>
      <button class="collector-tab-btn" data-coltab="links">Link</button>
    </div>
    <div class="collector-list" id="collectorList"></div>
    <div class="collector-footer">
      <button class="pill-chip" id="collectorExport" title="Export collected items as CSV">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export
      </button>
      <button class="pill-chip" id="collectorXref" title="Cross-reference with sources">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        X-Ref
      </button>
      <span class="collector-count" id="collectorCount">0 items</span>
    </div>
    <div class="collector-actions">
      <button class="tool-chip" id="collectorToMonitors" title="Add collected links as monitored pages">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        + Monitor
      </button>
      <button class="tool-chip" id="collectorToSources" title="Add collected items as a source">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        + Source
      </button>
      <button class="tool-chip" id="collectorToKG" title="Create Knowledge Graph entities from collected items">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><line x1="12" y1="8" x2="5" y2="16"/><line x1="12" y1="8" x2="19" y2="16"/></svg>
        + KG Entity
      </button>
    </div>
  </div>

  <script src="../lib/purify.min.js"></script>
  <script src="../lib/marked.min.js"></script>
  <script src="../shared/text-it.js"></script>
  <script src="../shared/xmpp-chat.js"></script>
  <script src="../lib/argus-chat.js"></script>
  <script src="link-map.js"></script>
  <div id="xmpp-chat-container"></div>
  <script>
    if (typeof XmppChat !== "undefined") {
      XmppChat.init({ container: document.getElementById("xmpp-chat-container"), pageId: "linkmap" });
    }
  </script>
</body>
</html>
