<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entity Heatmap - Argus OSINT</title>
  <link rel="stylesheet" href="heatmap.css">
  <link rel="stylesheet" href="../lib/argus-chat.css">
  <link rel="stylesheet" href="../shared/ribbon.css">
</head>
<body>
  <script src="../shared/ribbon.js"></script>
  <header class="heatmap-header">
    <div class="header-left">
      <img src="../icons/icon-32.png" alt="Argus" class="header-icon">
      <h1 class="header-title">Entity Heatmap</h1>
      <span class="project-badge" id="projectBadge">Loading...</span>
    </div>
    <div class="header-right">
      <button class="btn-export" id="exportPng">Export PNG</button>
      <button class="btn-export btn-secondary" id="exportCsv">Export CSV</button>
    </div>
  </header>

  <div class="controls-bar">
    <div class="filter-group">
      <label class="filter-pill active">
        <input type="checkbox" data-type="all" checked>
        <span>All</span>
      </label>
      <label class="filter-pill active">
        <input type="checkbox" data-type="person" checked>
        <span class="type-dot" style="background:#e94560"></span>
        <span>Person</span>
      </label>
      <label class="filter-pill active">
        <input type="checkbox" data-type="organization" checked>
        <span class="type-dot" style="background:#64b5f6"></span>
        <span>Organization</span>
      </label>
      <label class="filter-pill active">
        <input type="checkbox" data-type="location" checked>
        <span class="type-dot" style="background:#4caf50"></span>
        <span>Location</span>
      </label>
      <label class="filter-pill active">
        <input type="checkbox" data-type="date" checked>
        <span class="type-dot" style="background:#ffb74d"></span>
        <span>Date</span>
      </label>
      <label class="filter-pill active">
        <input type="checkbox" data-type="amount" checked>
        <span class="type-dot" style="background:#ce93d8"></span>
        <span>Amount</span>
      </label>
      <label class="filter-pill active">
        <input type="checkbox" data-type="other" checked>
        <span class="type-dot" style="background:#a0a0b0"></span>
        <span>Other</span>
      </label>
    </div>

    <div class="control-group">
      <label class="control-label">
        Min mentions:
        <input type="range" id="minMentions" min="1" max="50" value="1">
        <span id="minMentionsVal">1</span>
      </label>
    </div>

    <div class="control-group">
      <label class="control-label">
        Sort:
        <select id="sortMode">
          <option value="mentions">By total mentions</option>
          <option value="alpha">Alphabetical</option>
        </select>
      </label>
    </div>
  </div>

  <div class="heatmap-body">
    <div class="canvas-container" id="canvasContainer">
      <canvas id="heatmapCanvas"></canvas>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18M9 3v18"/>
        </svg>
      </div>
      <p class="empty-title">No entity data available</p>
      <p class="empty-desc">Analyze pages with entity extraction enabled, then view the heatmap to see entity frequency across sources.</p>
    </div>
  </div>

  <footer class="heatmap-footer">
    <div class="legend">
      <span class="legend-label">Low</span>
      <div class="legend-gradient" id="legendGradient"></div>
      <span class="legend-label">High</span>
    </div>
    <div class="stats-bar">
      <span class="stat">Entities: <strong id="statEntities">0</strong></span>
      <span class="stat">Pages: <strong id="statPages">0</strong></span>
    </div>
  </footer>

  <div id="argus-chat-container" style="padding:16px 20px;"></div>

  <script src="../lib/purify.min.js"></script>
  <script src="../lib/marked.min.js"></script>
  <script src="../lib/argus-chat.js"></script>
  <script src="heatmap.js"></script>
</body>
</html>
