<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmarks - Argus</title>
  <link rel="stylesheet" href="../shared/argus-std.css">
  <link rel="stylesheet" href="../shared/ribbon.css">
  <link rel="stylesheet" href="../shared/options-ui.css">
  <link rel="stylesheet" href="bookmarks.css">
</head>
<body>
  <script src="../lib/vendor/browser-polyfill.min.js"></script>
  <script src="../shared/theme.js"></script>
  <script src="../shared/ribbon.js"></script>

  <div class="settings-container" style="padding-top: 12px;">

    <div class="bm-toolbar">
      <div class="bm-toolbar-left">
        <input type="text" id="bm-search" placeholder="Search bookmarks..." class="bm-search-input">
      </div>
      <div class="bm-toolbar-right">
        <button id="bm-refresh" class="pill-chip" title="Refresh bookmarks">Refresh</button>
        <button id="bm-analyze-selected" class="pill-chip hidden">Analyze Selected</button>
        <button id="bm-select-toggle" class="pill-chip">Select</button>
        <button id="bm-export" class="pill-chip">Export JSON</button>
        <button id="bm-sync-github" class="pill-chip" title="Sync metadata to GitHub + snapshots to connected drives">Sync to Cloud</button>
      </div>
    </div>

    <div class="bm-layout">
      <aside class="bm-sidebar">
        <div class="bm-sidebar-section">
          <h3 class="bm-sidebar-heading">Folders <button id="bm-new-folder" class="btn-icon" title="New folder">+</button></h3>
          <div id="bm-folder-tree" class="bm-folder-tree">
            <div class="bm-folder-item active" data-folder-id="">All Bookmarks</div>
          </div>
        </div>
        <div class="bm-sidebar-section">
          <h3 class="bm-sidebar-heading">Categories</h3>
          <div id="bm-category-list" class="bm-filter-list"></div>
        </div>
        <div class="bm-sidebar-section">
          <h3 class="bm-sidebar-heading">Tags</h3>
          <div id="bm-tag-cloud" class="bm-tag-cloud"></div>
        </div>
        <div class="bm-sidebar-section">
          <a href="#" id="bm-customize-tagging" class="bm-sidebar-link">Customize AI tagging &rarr;</a>
        </div>
      </aside>

      <div class="bm-main">
        <div id="bm-active-filters" class="bm-active-filters hidden"></div>
        <div id="bm-count" class="bm-count"></div>
        <div id="bm-list" class="bm-list"></div>
        <div id="bm-empty" class="bm-empty hidden">
          <p>No bookmarks yet. Right-click any page and choose <strong>Argus &gt; Bookmark with AI Tags</strong> to get started.</p>
        </div>
      </div>
    </div>

    <!-- Edit modal -->
    <div id="bm-edit-modal" class="bm-modal-overlay hidden">
      <div class="bm-modal">
        <div class="bm-modal-header">
          <h2 class="bm-modal-title">Edit Bookmark</h2>
          <button id="bm-modal-close" class="bm-modal-close">&times;</button>
        </div>
        <div class="bm-modal-body">
          <label class="bm-field-label">Folder</label>
          <select id="bm-edit-folder" class="bm-field-input"></select>
          <label class="bm-field-label">Tags (comma-separated)</label>
          <input type="text" id="bm-edit-tags" class="bm-field-input">
          <label class="bm-field-label">Category</label>
          <input type="text" id="bm-edit-category" class="bm-field-input">
          <label class="bm-field-label">Notes</label>
          <textarea id="bm-edit-notes" class="bm-field-textarea" rows="4"></textarea>
        </div>
        <div class="bm-modal-footer">
          <button id="bm-edit-save" class="pill-chip btn-primary">Save</button>
          <button id="bm-edit-cancel" class="pill-chip">Cancel</button>
        </div>
      </div>
    </div>

  </div>

  <script src="bookmarks.js"></script>
</body>
</html>
