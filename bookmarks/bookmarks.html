<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Bookmarks - Argus</title>
  <link rel="stylesheet" href="bookmarks.css">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <img src="../icons/icon-32.png" alt="" class="header-icon">
      <h1 class="header-title">Argus Bookmarks</h1>
    </div>
    <div class="header-right">
      <button id="analyze-selected" class="pill-chip hidden">Analyze Selected</button>
      <button id="select-toggle" class="btn btn-secondary btn-small">Select</button>
      <button id="export-bookmarks" class="btn btn-secondary btn-small">Export JSON</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="Search bookmarks..." class="search-input">
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-heading">Categories</h3>
        <div id="category-list" class="filter-list"></div>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-heading">Tags</h3>
        <div id="tag-cloud" class="tag-cloud"></div>
      </div>
    </aside>

    <main class="main-content">
      <div id="active-filters" class="active-filters hidden"></div>
      <div id="bookmark-count" class="bookmark-count"></div>
      <div id="bookmark-list" class="bookmark-list"></div>
      <div id="empty-state" class="empty-state hidden">
        <p>No bookmarks yet. Right-click any page and choose <strong>Argus &gt; Bookmark with AI Tags</strong> to get started.</p>
      </div>
    </main>
  </div>

  <!-- Edit modal -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Edit Bookmark</h2>
        <button id="modal-close" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <label class="field-label">Tags (comma-separated)</label>
        <input type="text" id="edit-tags" class="field-input">
        <label class="field-label">Category</label>
        <input type="text" id="edit-category" class="field-input">
        <label class="field-label">Notes</label>
        <textarea id="edit-notes" class="field-textarea" rows="4"></textarea>
      </div>
      <div class="modal-footer">
        <button id="edit-save" class="pill-chip">Save</button>
        <button id="edit-cancel" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="../lib/vendor/browser-polyfill.min.js"></script>
  <script src="bookmarks.js"></script>
</body>
</html>
